name: CI

permissions:
  actions: read
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  merge_group:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Determine the OS matrix for CI jobs based on context:
  #   - merge_group tip entry: full suite (all OSes)
  #   - merge_group non-tip entry: skip heavy jobs (fast path)
  #   - workflow_dispatch / ci/merge label: all OSes
  #   - ci/tier-1 label: centos-10 only (fast feedback on the primary target)
  #   - plain PR: no heavy jobs
  compute-ci-level:
    runs-on: ubuntu-latest
    outputs:
      package_os_matrix: ${{ steps.matrix.outputs.package_os_matrix }}
      integration_os_matrix: ${{ steps.matrix.outputs.integration_os_matrix }}
      upgrade_os_matrix: ${{ steps.matrix.outputs.upgrade_os_matrix }}
      run_heavy: ${{ steps.matrix.outputs.run_heavy }}
    steps:
      - name: Compute OS matrices
        id: matrix
        env:
          GH_TOKEN: ${{ github.token }}
          MERGE_BASE_REF: ${{ github.event.merge_group.base_ref || 'refs/heads/main' }}
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          EVENT='${{ github.event_name }}'

          if [[ "$EVENT" == "merge_group" ]]; then
            OWNER="${GITHUB_REPOSITORY_OWNER}"
            REPO="${GITHUB_REPOSITORY#*/}"
            # Strip refs/heads/ prefix to get plain branch name
            BRANCH="${MERGE_BASE_REF#refs/heads/}"

            echo "Detecting merge queue tip for branch: $BRANCH"
            echo "Current SHA: $GITHUB_SHA"

            TIP_OID=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $branch: String!) {
                repository(owner: $owner, name: $repo) {
                  mergeQueue(branch: $branch) {
                    entries(last: 1) {
                      nodes { headCommit { oid } }
                    }
                  }
                }
              }' -F owner="$OWNER" -F repo="$REPO" -F branch="$BRANCH" \
              --jq '.data.repository.mergeQueue.entries.nodes[0].headCommit.oid' 2>/dev/null \
              || echo "API_FAILED")

            echo "Tip OID from API: $TIP_OID"

            if [[ "$TIP_OID" == "API_FAILED" || -z "$TIP_OID" || "$TIP_OID" == "null" ]]; then
              echo "WARNING: Could not determine queue tip, defaulting to full suite"
              IS_TIP=true
            elif [[ "$TIP_OID" == "$GITHUB_SHA" ]]; then
              echo "This entry IS the queue tip - running full suite"
              IS_TIP=true
            else
              echo "This entry is NOT the queue tip (tip=$TIP_OID) - skipping heavy jobs"
              IS_TIP=false
            fi

            if [[ "$IS_TIP" == "true" ]]; then
              echo 'package_os_matrix=["fedora-43","fedora-44","fedora-45","centos-9","centos-10"]' >> "$GITHUB_OUTPUT"
              echo 'integration_os_matrix=["fedora-43","fedora-44","centos-9","centos-10"]' >> "$GITHUB_OUTPUT"
              echo 'upgrade_os_matrix=["fedora-43","centos-10"]' >> "$GITHUB_OUTPUT"
              echo 'run_heavy=true' >> "$GITHUB_OUTPUT"
            else
              echo 'package_os_matrix=[]' >> "$GITHUB_OUTPUT"
              echo 'integration_os_matrix=[]' >> "$GITHUB_OUTPUT"
              echo 'upgrade_os_matrix=[]' >> "$GITHUB_OUTPUT"
              echo 'run_heavy=false' >> "$GITHUB_OUTPUT"
            fi

            echo "### Merge Queue Position" >> "$GITHUB_STEP_SUMMARY"
            echo "- SHA: \`$GITHUB_SHA\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Tip SHA: \`$TIP_OID\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Is tip: **$IS_TIP**" >> "$GITHUB_STEP_SUMMARY"
            echo "- run_heavy: **$IS_TIP**" >> "$GITHUB_STEP_SUMMARY"

          elif [[ "$EVENT" == "workflow_dispatch" ]] \
              || echo "$LABELS" | jq -e 'index("ci/merge")' > /dev/null; then
            # Full suite: all OSes
            echo 'package_os_matrix=["fedora-43","fedora-44","fedora-45","centos-9","centos-10"]' >> "$GITHUB_OUTPUT"
            echo 'integration_os_matrix=["fedora-43","fedora-44","centos-9","centos-10"]' >> "$GITHUB_OUTPUT"
            echo 'upgrade_os_matrix=["fedora-43","centos-10"]' >> "$GITHUB_OUTPUT"
            echo 'run_heavy=true' >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | jq -e 'index("ci/tier-1")' > /dev/null; then
            # Tier-1 only: centos-10
            echo 'package_os_matrix=["centos-10"]' >> "$GITHUB_OUTPUT"
            echo 'integration_os_matrix=["centos-10"]' >> "$GITHUB_OUTPUT"
            echo 'upgrade_os_matrix=["centos-10"]' >> "$GITHUB_OUTPUT"
            echo 'run_heavy=true' >> "$GITHUB_OUTPUT"
          else
            # Plain PR: skip heavy jobs entirely
            echo 'package_os_matrix=[]' >> "$GITHUB_OUTPUT"
            echo 'integration_os_matrix=[]' >> "$GITHUB_OUTPUT"
            echo 'upgrade_os_matrix=[]' >> "$GITHUB_OUTPUT"
            echo 'run_heavy=false' >> "$GITHUB_OUTPUT"
          fi

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "validate passed"

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "cargo-deny passed"

  install-tests:
    name: "Test install"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "install-tests passed"

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "docs passed"

  package:
    if: needs.compute-ci-level.outputs.run_heavy == 'true'
    needs: compute-ci-level
    strategy:
      fail-fast: false
      matrix:
        test_os: ${{ fromJson(needs.compute-ci-level.outputs.package_os_matrix) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "package ${{ matrix.test_os }} passed"

  test-integration:
    if: needs.compute-ci-level.outputs.run_heavy == 'true'
    needs: [compute-ci-level, package]
    strategy:
      fail-fast: false
      matrix:
        test_os: ${{ fromJson(needs.compute-ci-level.outputs.integration_os_matrix) }}
        variant: [ostree, composefs]
        filesystem: ["ext4", "xfs"]
        bootloader: ["grub", "systemd"]
        boot_type: ["bls", "uki"]
        seal_state: ["sealed", "unsealed"]
        exclude:
          - test_os: centos-9
            variant: composefs
          - seal_state: "sealed"
            boot_type: bls
          - seal_state: "sealed"
            bootloader: grub
          - seal_state: "sealed"
            filesystem: xfs
          - seal_state: "unsealed"
            filesystem: ext4
            boot_type: uki
          - bootloader: grub
            boot_type: "uki"
          - variant: ostree
            filesystem: ext4
          - variant: ostree
            boot_type: uki
          - variant: ostree
            bootloader: systemd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "test-integration ${{ matrix.test_os }} ${{ matrix.variant }} ${{ matrix.filesystem }} ${{ matrix.bootloader }} ${{ matrix.boot_type }} ${{ matrix.seal_state }} passed"

  test-upgrade:
    if: needs.compute-ci-level.outputs.run_heavy == 'true'
    needs: [compute-ci-level, package]
    strategy:
      fail-fast: false
      matrix:
        test_os: ${{ fromJson(needs.compute-ci-level.outputs.upgrade_os_matrix) }}
        variant: [ostree, composefs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "test-upgrade ${{ matrix.test_os }} ${{ matrix.variant }} passed"

  test-container-export:
    if: needs.compute-ci-level.outputs.run_heavy == 'true'
    needs: [compute-ci-level, package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "test-container-export passed"

  # Sentinel job for required checks - configure this job name in repository settings.
  # Accepts 'skipped' as success so that merge_group-only jobs don't block PRs.
  required-checks:
    if: always()
    needs: [compute-ci-level, cargo-deny, validate, install-tests, docs, package, test-integration, test-upgrade, test-container-export]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        env:
          NEEDS: ${{ toJson(needs) }}
        run: |
          FAILED=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result | IN("success","skipped") | not) | .key')
          if [ -n "$FAILED" ]; then
            echo "The following jobs did not succeed: $FAILED"
            exit 1
          fi
