# cargo-nextest configuration for bcvk
# https://nexte.st/book/configuration
# 
# Integration tests use libtest-mimic which is fully compatible with nextest

[store]
# Max test runtime data to collect
# This helps with analyzing test performance
dir = "target/nextest"

[profile.default]
# Standard settings for unit tests
test-threads = "num-cpus"
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = false
failure-output = "immediate"
success-output = "never"
status-level = "pass"

# Profile for integration tests - run with limited parallelism due to QEMU/KVM resources
[profile.integration]
test-threads = 2
# Full 20 minutes for a timeout by default, since GHA runners can be really slow
slow-timeout = { period = "1200s", terminate-after = 60 }
fail-fast = false
failure-output = "immediate"
success-output = "never"
status-level = "pass"
# Only run integration tests with this profile
default-filter = "package(integration-tests)"

[profile.integration.junit]
path = "junit.xml"
store-success-output = true
store-failure-output = true

# Per-test overrides for tests that create VMs or run `bootc install`.
# These are memory-hungry (each spins up a QEMU VM with swap), so on the
# 16 GB CI runners two of them in parallel can trigger the OOM killer.
# Requiring all 2 threads effectively serialises them.
#
# NOTE: use /regex/ syntax, not ~substring — the ~ operator treats ^ $ as
# literal characters, so ~^foo never matches anything.
[[profile.integration.overrides]]
filter = '''
  test(/to_?disk/)
  | test(/^test_libvirt_run/)
  | test(/^test_libvirt_(comprehensive|ssh_integration|port_forward_(xml|connectivity))/)
  | test(/^test_base_disk_creation/)
  | test(=test_varlink_ephemeral_run_ps_and_ssh)
'''
threads-required = 2

# Timeout for test_run_ephemeral_with_instancetype which hangs in CI due to
# GitHub Actions environment changes (passes locally, last passed in CI on Feb 5)
[[profile.integration.overrides]]
filter = 'test(=test_run_ephemeral_with_instancetype)'
slow-timeout = { period = "60s", terminate-after = 1 }
